<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Yandex Maps 3.0 Style Tester</title>

<style>
    html, body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        font-family: Arial, sans-serif;
        background: #111;
    }

    #map {
        width: 100%;
        height: 100%;
    }

    .panel {
        position: absolute;
        top: 10px;
        left: 10px;
        z-index: 1000;

        width: 320px;
        max-height: calc(100vh - 20px);
        overflow-y: auto;

        background: rgba(20,20,20,0.95);
        color: white;

        border-radius: 12px;
        padding: 16px;
        box-sizing: border-box;

        backdrop-filter: blur(10px);
    }

    .panel h2 {
        margin-top: 0;
        font-size: 20px;
    }

    .section {
        margin-bottom: 20px;
        border-bottom: 1px solid #333;
        padding-bottom: 12px;
    }

    .section:last-child {
        border-bottom: none;
    }

    label {
        display: block;
        margin-bottom: 8px;
        cursor: pointer;
    }

    button {
        width: 100%;
        margin-top: 8px;
        padding: 10px;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        background: #2d7fff;
        color: white;
        font-size: 14px;
    }

    button:hover {
        opacity: 0.9;
    }

    input[type="file"] {
        width: 100%;
        margin-top: 8px;
    }

    textarea {
        width: 100%;
        height: 120px;
        margin-top: 10px;
        background: #000;
        color: #0f0;
        border: 1px solid #333;
        border-radius: 8px;
        padding: 10px;
        box-sizing: border-box;
        resize: vertical;
        font-size: 12px;
    }

    .marker {
        width: 48px;
        height: 48px;
        background-size: contain;
        background-repeat: no-repeat;
        background-position: center;
        transform: translate(-24px, -48px);
    }

    .info {
        font-size: 12px;
        color: #aaa;
        margin-top: 6px;
    }
</style>
</head>
<body>

<div id="map"></div>

<div class="panel">
    <h2>Yandex Maps v3 Tester</h2>

    <div class="section">
        <h3>Слои</h3>

        <label><input type="checkbox" checked data-layer="water"> Вода</label>
        <label><input type="checkbox" checked data-layer="landscape"> Зелень</label>
        <label><input type="checkbox" checked data-layer="poi"> POI</label>
        <label><input type="checkbox" checked data-layer="road"> Дороги</label>
        <label><input type="checkbox" checked data-layer="building"> Здания</label>
        <label><input type="checkbox" checked data-layer="transit"> Транспорт</label>
        <label><input type="checkbox" checked data-layer="country"> Границы</label>
        <label><input type="checkbox" checked data-layer="address"> Адреса</label>
    </div>

    <div class="section">
        <h3>Маркеры</h3>

        <input type="file" id="markerFile" accept=".png,.svg">

        <div class="info">
            Клик по карте добавляет маркер
        </div>

        <button id="clearMarkers">Очистить маркеры</button>
    </div>

    <div class="section">
        <h3>Маршрут</h3>

        <button id="buildRoute">Построить маршрут</button>
        <button id="clearRoute">Удалить маршрут</button>
    </div>

    <div class="section">
        <h3>Экспорт JSON</h3>

        <button id="exportJson">Export Style JSON</button>

        <textarea id="jsonOutput"></textarea>
    </div>
</div>

<script src="https://api-maps.yandex.ru/v3/?apikey=e2cf8129-ff43-4729-b542-1591d12b5fef&lang=ru_RU"></script>

<script type="module">

await ymaps3.ready;

const {
    YMap,
    YMapDefaultSchemeLayer,
    YMapDefaultFeaturesLayer,
    YMapMarker,
    YMapFeature
} = ymaps3;

const map = new YMap(
    document.getElementById('map'),
    {
        location: {
            center: [37.617644, 55.755819],
            zoom: 10
        }
    }
);

let customization = [];

let schemeLayer = new YMapDefaultSchemeLayer({
    customization
});

map.addChild(schemeLayer);
map.addChild(new YMapDefaultFeaturesLayer());

let markers = [];
let routeFeature = null;

let customMarkerImage = null;

function buildCustomization() {

    customization = [];

    document.querySelectorAll('[data-layer]').forEach(el => {

        const visible = el.checked;
        const layer = el.dataset.layer;

        customization.push({
            tags: {
                any: [layer]
            },
            stylers: [
                {
                    visibility: visible ? 'on' : 'off'
                }
            ]
        });

    });

    map.removeChild(schemeLayer);

    schemeLayer = new YMapDefaultSchemeLayer({
        customization
    });

    map.addChild(schemeLayer);
}

document.querySelectorAll('[data-layer]').forEach(el => {
    el.addEventListener('change', buildCustomization);
});

buildCustomization();

document.getElementById('markerFile').addEventListener('change', e => {

    const file = e.target.files[0];
    if (!file) return;

    const reader = new FileReader();

    reader.onload = ev => {
        customMarkerImage = ev.target.result;
    };

    reader.readAsDataURL(file);

});

map.addListener('click', (object, event) => {

    const coords = event.coordinates;

    const markerElement = document.createElement('div');

    markerElement.className = 'marker';

    if (customMarkerImage) {
        markerElement.style.backgroundImage = `url(${customMarkerImage})`;
    } else {
        markerElement.style.backgroundImage =
            'url(https://cdn-icons-png.flaticon.com/512/684/684908.png)';
    }

    const marker = new YMapMarker(
        {
            coordinates: coords,
            draggable: true
        },
        markerElement
    );

    map.addChild(marker);

    markers.push({
        marker,
        coordinates: coords
    });

});

document.getElementById('clearMarkers').addEventListener('click', () => {

    markers.forEach(m => {
        map.removeChild(m.marker);
    });

    markers = [];

});

document.getElementById('buildRoute').addEventListener('click', async () => {

    if (markers.length < 2) {
        alert('Нужно минимум 2 маркера');
        return;
    }

    if (routeFeature) {
        map.removeChild(routeFeature);
    }

    const coordinates = markers.map(m => m.coordinates);

    routeFeature = new YMapFeature({
        geometry: {
            type: 'LineString',
            coordinates
        },
        style: {
            stroke: [{
                color: '#ff0000',
                width: 5
            }]
        }
    });

    map.addChild(routeFeature);

});

document.getElementById('clearRoute').addEventListener('click', () => {

    if (routeFeature) {
        map.removeChild(routeFeature);
        routeFeature = null;
    }

});

document.getElementById('exportJson').addEventListener('click', () => {

    const json = JSON.stringify(customization, null, 2);

    document.getElementById('jsonOutput').value = json;

});

</script>

</body>
  </html>
