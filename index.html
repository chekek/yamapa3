<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Yandex Maps v3 Tester</title>

<style>
html, body {
    margin: 0;
    width: 100%;
    height: 100%;
    overflow: hidden;
    font-family: Arial, sans-serif;
}

#map {
    width: 100%;
    height: 100%;
}

.panel {
    position: absolute;
    top: 10px;
    left: 10px;
    z-index: 1000;

    width: 320px;
    max-height: calc(100vh - 20px);
    overflow-y: auto;

    background: rgba(0,0,0,0.88);
    color: white;

    padding: 16px;
    border-radius: 12px;
    box-sizing: border-box;
}

.panel h2 {
    margin-top: 0;
}

.section {
    margin-bottom: 20px;
}

label {
    display: block;
    margin-bottom: 8px;
}

button {
    width: 100%;
    margin-top: 8px;
    padding: 10px;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    background: #2d7fff;
    color: white;
}

textarea {
    width: 100%;
    height: 120px;
    margin-top: 10px;
    background: #111;
    color: #0f0;
    border: 1px solid #333;
    border-radius: 8px;
    padding: 10px;
    box-sizing: border-box;
}

.marker {
    width: 48px;
    height: 48px;
    background-size: contain;
    background-repeat: no-repeat;
    background-position: center;
    transform: translate(-24px, -48px);
}
</style>
</head>

<body>

<div id="map"></div>

<div class="panel">

    <h2>Yandex Maps v3</h2>

    <div class="section">
        <h3>Слои</h3>

        <label><input type="checkbox" checked data-layer="water"> Вода</label>
        <label><input type="checkbox" checked data-layer="landscape"> Зелень</label>
        <label><input type="checkbox" checked data-layer="poi"> POI</label>
        <label><input type="checkbox" checked data-layer="road"> Дороги</label>
        <label><input type="checkbox" checked data-layer="building"> Здания</label>
        <label><input type="checkbox" checked data-layer="transit"> Транспорт</label>
    </div>

    <div class="section">
        <h3>Маркеры</h3>

        <input type="file" id="markerFile" accept=".png,.svg">

        <button id="clearMarkers">
            Очистить маркеры
        </button>
    </div>

    <div class="section">
        <h3>Маршрут</h3>

        <button id="buildRoute">
            Построить линию
        </button>

        <button id="clearRoute">
            Удалить маршрут
        </button>
    </div>

    <div class="section">
        <h3>JSON</h3>

        <button id="exportJson">
            Export JSON
        </button>

        <textarea id="jsonOutput"></textarea>
    </div>

</div>

<script src="https://api-maps.yandex.ru/v3/?apikey=e2cf8129-ff43-4729-b542-1591d12b5fef&lang=ru_RU"></script>

<script type="module">

await ymaps3.ready;

const {
    YMap,
    YMapDefaultSchemeLayer,
    YMapDefaultFeaturesLayer,
    YMapMarker,
    YMapFeature,
    YMapListener
} = ymaps3;

const map = new YMap(
    document.getElementById('map'),
    {
        location: {
            center: [37.617644, 55.755819],
            zoom: 10
        }
    }
);

let customization = [];

const schemeLayer = new YMapDefaultSchemeLayer({
    customization
});

const featuresLayer = new YMapDefaultFeaturesLayer();

map.addChild(schemeLayer);
map.addChild(featuresLayer);

let markers = [];
let routeFeature = null;

let customMarkerImage = null;

function rebuildCustomization() {

    customization.length = 0;

    document.querySelectorAll('[data-layer]').forEach(el => {

        customization.push({
            tags: {
                any: [el.dataset.layer]
            },
            stylers: [
                {
                    visibility: el.checked ? 'on' : 'off'
                }
            ]
        });

    });

    schemeLayer.update({
        customization
    });
}

document.querySelectorAll('[data-layer]').forEach(el => {
    el.addEventListener('change', rebuildCustomization);
});

rebuildCustomization();

document.getElementById('markerFile').addEventListener('change', e => {

    const file = e.target.files[0];

    if (!file) return;

    const reader = new FileReader();

    reader.onload = ev => {
        customMarkerImage = ev.target.result;
    };

    reader.readAsDataURL(file);

});

const listener = new YMapListener({
    layer: 'any',

    onClick: (object, event) => {

        const coords = event.coordinates;

        const markerElement = document.createElement('div');

        markerElement.className = 'marker';

        markerElement.style.backgroundImage = `url(${
            customMarkerImage ||
            'https://cdn-icons-png.flaticon.com/512/684/684908.png'
        })`;

        const marker = new YMapMarker(
            {
                coordinates: coords
            },
            markerElement
        );

        map.addChild(marker);

        markers.push({
            marker,
            coordinates: coords
        });

    }
});

map.addChild(listener);

document.getElementById('clearMarkers').addEventListener('click', () => {

    markers.forEach(m => {
        map.removeChild(m.marker);
    });

    markers = [];

});

document.getElementById('buildRoute').addEventListener('click', () => {

    if (markers.length < 2) {
        alert('Нужно минимум 2 маркера');
        return;
    }

    if (routeFeature) {
        map.removeChild(routeFeature);
    }

    const coordinates = markers.map(m => m.coordinates);

    routeFeature = new YMapFeature({
        geometry: {
            type: 'LineString',
            coordinates
        },
        style: {
            stroke: [
                {
                    color: '#ff0000',
                    width: 4
                }
            ]
        }
    });

    map.addChild(routeFeature);

});

document.getElementById('clearRoute').addEventListener('click', () => {

    if (routeFeature) {
        map.removeChild(routeFeature);
        routeFeature = null;
    }

});

document.getElementById('exportJson').addEventListener('click', () => {

    document.getElementById('jsonOutput').value =
        JSON.stringify(customization, null, 2);

});

</script>

</body>
    </html>
